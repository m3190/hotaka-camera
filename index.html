<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive">
    
<title>ライブカメラ一覧</title>

<style>
    html,
    body {
        margin: 0;
        padding: 0;
        background: #000;
        width: 100%;
        height: 100%;
    }

    .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    width: 100vw;
    height: 100vh;

    gap: 10px;
    padding: 10px;
    box-sizing: border-box;

    background: #111;
}

.panel {
    position: relative;
    overflow: hidden;
    background: #000;

    border: 2px solid #444;
    border-radius: 8px;

    box-shadow: 0 0 8px rgba(0,0,0,0.5);

}

@media (max-width: 768px) {

    html,
    body {
        height: auto;
    }

    .grid {
        display: flex;
        flex-direction: column;

        width: 100%;
        height: auto;

        gap: 10px;
        padding: 10px;
        box-sizing: border-box;
    }

    .panel {
        height: 45vh;
        min-height: 280px;
    }
}

    

    .panel img,
    .panel iframe {
        width: 100%;
        height: 100%;
        border: 0;
        object-fit: contain;
    }

    .label {
        position: absolute;
        left: 8px;
        top: 8px;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        font-size: 14px;
        font-weight: bold;
        padding: 4px 8px;
        border-radius: 4px;
        font-family: sans-serif;
    }
@media (max-width: 768px) {
    .panel img {
        object-fit: contain;
        background: #000;
    }

    .panel iframe {
        width: 100%;
        height: 100%;
    }
}
    /* スマホ表示 */

    
</style>
</head>

<body>

<div class="grid">

    <div class="panel">
        <div class="label">穂高岳山荘 東</div>
        <img id="hotaka1"
            src="https://www.hotakadakesanso.com/livecam-data/hotakacam1.jpg">
    </div>

    <div class="panel">
        <div class="label">穂高岳山荘 西</div>
        <img id="hotaka2"
            src="https://www.hotakadakesanso.com/livecam-data/hotakacam2.jpg">
    </div>

    <div class="panel">
        <div class="label">涸沢ヒュッテ</div>
        <img id="karasawa"
            src="https://www.kamikochi-vc.or.jp/livecam/northalps_latest_images/karasawa.jpg">
    </div>

    <div class="panel">
        <div class="label">蝶ヶ岳ヒュッテ</div>
        <img id="cho"
            src="https://www.kamikochi-vc.or.jp/livecam/northalps_latest_images/cyougatake.jpg">
    </div>

    <div class="panel">
        <div class="label">五千尺</div>
        <iframe
    src="https://www.youtube.com/embed/Iv2VUE_UhRQ?autoplay=1&mute=1&playsinline=1"
    allow="autoplay; fullscreen"
    allowfullscreen>
</iframe>
    </div>

    <div class="panel">
        <div class="label">上高地バスターミナル</div>
       <iframe
    src="https://www.youtube.com/embed/Hz3GKL4yDcw?autoplay=1&mute=1&playsinline=1"
    allow="autoplay; fullscreen"
    allowfullscreen>
</iframe>
    </div>

</div>

<script>
    function refreshImages() {
        const t = Date.now();

        document.getElementById('hotaka1').src =
            'https://www.hotakadakesanso.com/livecam-data/hotakacam1.jpg?t=' + t;

        document.getElementById('hotaka2').src =
            'https://www.hotakadakesanso.com/livecam-data/hotakacam2.jpg?t=' + t;

        document.getElementById('karasawa').src =
            'https://www.kamikochi-vc.or.jp/livecam/northalps_latest_images/karasawa.jpg?t=' + t;

        document.getElementById('cho').src =
            'https://www.kamikochi-vc.or.jp/livecam/northalps_latest_images/cyougatake.jpg?t=' + t;
    }

    setInterval(refreshImages, 300000);
</script>
</body>
</html>
